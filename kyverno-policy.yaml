apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image
  annotations:
    policies.kyverno.io/title: Verify Image
    policies.kyverno.io/category: Software Supply Chain Security, EKS Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.7.0
    policies.kyverno.io/description: >-
      Enforces that all pods run only signed images. Images from orima2002 
      must be signed with the project Cosign key. ArgoCD and Kyverno system 
      images are verified keyless via Sigstore.
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-image
      match:
        any:
          - resources:
              kinds:
                - Pod
      verifyImages:
        - imageReferences:
            - "orima2002/*"
            - "docker.io/orima2002/*"
          mutateDigest: true
          attestors:
            - entries:
                - keys:
                    publicKeys: |
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEK0D84Cd1nguM6V5PAEYiXqImY/Gd
                      S9MGOR2bXqkD6nvmSwTAgGocZp80KBJdp7aNQD9Uy4wpvDOjA0F0c+yOyA==
                      -----END PUBLIC KEY-----

    - name: verify-argocd-images
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - argocd
      verifyImages:
        - imageReferences:
            - "quay.io/argoproj/*"
          mutateDigest: true
          attestors:
            - entries:
                - keyless:
                    subject: "https://github.com/argoproj/argo-cd/*"
                    issuer: "https://token.actions.githubusercontent.com"

    - name: verify-kyverno-images
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - kyverno
      verifyImages:
        - imageReferences:
            - "ghcr.io/kyverno/*"
          mutateDigest: true
          attestors:
            - entries:
                - keyless:
                    subject: "https://github.com/kyverno/kyverno/*"
                    issuer: "https://token.actions.githubusercontent.com"
    
    - name: deny-unknown-images
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kyverno
                - argocd
                - kube-system
      validate:
        message: "Only signed orima2002 images are allowed in this cluster."
        deny:
          conditions:
            all:
              - key: "{{ request.object.spec.containers[].image[] }}"
                operator: AllNotIn
                value:
                  - "orima2002/*"
                  - "docker.io/orima2002/*"