name: SLSA Pipeline

on:
  push:
    branches:
      - master

jobs:
  docker-build-push:
    name: Docker build and push
    outputs:
      tag: ${{steps.vars.outputs.tag}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set Image Tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Import GPG public key
        run: echo "${{secrets.GPG_PUBLIC_KEY}}" | gpg --import
      - name: Verify commit signature
        run: git log --show-signature -1 | grep "Good signature"
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sample-app:${{ steps.vars.outputs.tag }}
  create-sbom:
    name: Run Syft
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Install Syft
        run: curl -sSfL https://get.anchore.io/syft | sudo sh -s -- -b /usr/local/bin
      - name: Create SBOM
        run: syft ${{ secrets.DOCKERHUB_USERNAME }}/sample-app:${{ needs.docker-build-push.outputs.tag }} -o cyclonedx-json > sbom.json
      - name: Upload SBOM arifact
        uses: actions/upload-artifact@v4
        with:
          name: SBOM
          path: sbom.json
  scan-image:
    name: Scan image with Grype
    needs: create-sbom
    runs-on: ubuntu-latest
    steps:
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: SBOM
      - name: Scan SBOM
        run: grype sbom:./sbom.json --fail-on high -o json > grype-sbom-scan.json
      - name: Upload scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Report
          path: grype-sbom-scan.json
