name: SLSA Pipeline

on:
  push:
    branches:
      - master
permissions:
  contents: read
  packages: write

jobs:
  docker-build-push-ghcr:
    name: Docker build and push to GHCR
    outputs:
      tag: ${{steps.vars.outputs.tag}}
      digest: ${{steps.build.outputs.digest}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set Image Tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Import GPG public key
        run: echo "${{secrets.GPG_PUBLIC_KEY}}" | gpg --import
      - name: Verify commit signature
        run: git log --show-signature -1 | grep "Good signature"
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{env.OWNER}}/sample-app:${{ steps.vars.outputs.tag }}
  create-sbom:
    name: Run Syft
    needs: docker-build-push-ghcr
    runs-on: ubuntu-latest
    steps:
      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Install Syft
        run: curl -sSfL https://get.anchore.io/syft | sudo sh -s -- -b /usr/local/bin
      - name: Create SBOM
        run: syft ghcr.io/${{env.OWNER}}/sample-app:${{ needs.docker-build-push-ghcr.outputs.tag }} -o cyclonedx-json > sbom.json
      - name: Upload SBOM arifact
        uses: actions/upload-artifact@v4
        with:
          name: SBOM
          path: sbom.json
  scan-image:
    name: Scan image with Grype
    needs: create-sbom
    runs-on: ubuntu-latest
    steps:
      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
      - name: Download SBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: SBOM
      - name: Scan SBOM
        run: grype sbom:./sbom.json --fail-on high -o json > grype-sbom-scan.json
      - name: Upload scan results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Report
          path: grype-sbom-scan.json
  docker-build-push:
    name: Docker build and push to DockerHub
    needs:
      - scan-image
      - docker-build-push-ghcr
    outputs:
      tag: ${{steps.vars.outputs.tag}}
      digest: ${{steps.build.outputs.digest}}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set Image Tag
        id: vars
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set lowercase owner
        run: echo "OWNER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Pull and push Docker image
        id: build
        run: |
          docker pull ghcr.io/${{ env.OWNER }}/sample-app:${{ needs.docker-build-push-ghcr.outputs.tag }}
          docker tag ghcr.io/${{ env.OWNER }}/sample-app:${{ needs.docker-build-push-ghcr.outputs.tag }} ${{ secrets.DOCKERHUB_USERNAME }}/sample-app:${{ needs.docker-build-push-ghcr.outputs.tag }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/sample-app:${{ needs.docker-build-push-ghcr.outputs.tag }}
          echo "digest=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ secrets.DOCKERHUB_USERNAME }}/sample-app:${{ needs.docker-build-push-ghcr.outputs.tag }} | cut -d'@' -f2)" >> $GITHUB_OUTPUT
  cosign-sign-image:
    name: Sign image with Cosign
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.4.0
      - name: Sign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: cosign sign --yes --key env://COSIGN_PRIVATE_KEY ${{ secrets.DOCKERHUB_USERNAME }}/sample-app@${{ needs.docker-build-push.outputs.digest }}
  generate-provenance:
    name: Generate provenance
    needs: docker-build-push
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: orima2002/sample-app
      digest: ${{ needs.docker-build-push.outputs.digest }}
    secrets:
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-password: ${{ secrets.DOCKERHUB_TOKEN }}
  update-helmchart:
    name: Update sample app HelmChart
    runs-on: ubuntu-latest
    needs:
      - docker-build-push
      - generate-provenance
    steps:
      - name: Update Helm values.yaml
        run: |
          git config --global credential.helper store
          echo "https://Orim2002:${{secrets.HELM_REPO_TOKEN}}@github.com" > ~/.git-credentials
          git clone https://github.com/Orim2002/SLSA-Level-3-Sampleapp-HelmChart.git helm-repo
          cd helm-repo
          sed -i "s/tag: .*/tag: \"${{ needs.docker-build-push.outputs.tag }}@${{ needs.docker-build-push.outputs.digest }}\"/g" values.yaml
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add values.yaml
          git commit -m "chore: update image tag to ${{ needs.docker-build-push.outputs.tag }}"
          git push
